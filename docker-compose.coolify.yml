services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-postgres}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campaigns}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "5434:3306"
    networks:
      - app-network
    labels:
      - coolify.managed=true
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-postgres}@db:3306/${MYSQL_DATABASE:-campaigns}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-your-admin-api-key-here}
      # Insights / Weekly Brief — DeepSeek (server-side only)
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    ports:
      - "3002:3000"
    networks:
      - app-network
    labels:
      - coolify.managed=true
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-postgres}@db:3306/${MYSQL_DATABASE:-campaigns}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
      AI_JOB_POLL_MS: ${AI_JOB_POLL_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
      SCRAPER_HEADLESS: ${SCRAPER_HEADLESS:-true}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-45000}
      SCRAPER_RETRY_ATTEMPTS: ${SCRAPER_RETRY_ATTEMPTS:-3}
      SCRAPER_EXPAND_MAX_CLICKS: ${SCRAPER_EXPAND_MAX_CLICKS:-20}
      SCRAPER_EXPAND_WAIT_MS: ${SCRAPER_EXPAND_WAIT_MS:-1200}
    networks:
      - app-network
    labels:
      - coolify.managed=true
    depends_on:
      db:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
