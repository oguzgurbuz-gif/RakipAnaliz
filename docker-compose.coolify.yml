services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-campaigns}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-campaigns}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
      AI_JOB_POLL_MS: ${AI_JOB_POLL_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
      SCRAPER_HEADLESS: ${SCRAPER_HEADLESS:-true}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-45000}
      SCRAPER_EXPAND_MAX_CLICKS: ${SCRAPER_EXPAND_MAX_CLICKS:-20}
      SCRAPER_EXPAND_WAIT_MS: ${SCRAPER_EXPAND_WAIT_MS:-1200}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: