services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: campaigns
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    labels:
      - coolify.managed=true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campaigns"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/campaigns
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-your-admin-api-key-here}
    networks:
      - app-network
    labels:
      - coolify.managed=true
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/campaigns
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
      AI_JOB_POLL_MS: ${AI_JOB_POLL_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
      SCRAPER_HEADLESS: ${SCRAPER_HEADLESS:-true}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-45000}
      SCRAPER_RETRY_ATTEMPTS: ${SCRAPER_RETRY_ATTEMPTS:-3}
      SCRAPER_EXPAND_MAX_CLICKS: ${SCRAPER_EXPAND_MAX_CLICKS:-20}
      SCRAPER_EXPAND_WAIT_MS: ${SCRAPER_EXPAND_WAIT_MS:-1200}
    networks:
      - app-network
    labels:
      - coolify.managed=true
    depends_on:
      db:
        condition: service_healthy

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
