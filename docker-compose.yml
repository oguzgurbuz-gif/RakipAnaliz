services:
  db:
    image: mysql:8.4
    container_name: bitalih-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: postgres
      MYSQL_DATABASE: campaigns
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - bitalih-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppostgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: bitalih-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:postgres@db:3306/campaigns}
      PNPM_HOME: /pnpm
    ports:
      - "3002:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bitalih-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: bitalih-scraper
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-mysql://root:postgres@db:3306/campaigns}
      PNPM_HOME: /pnpm
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/chat/completions}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-your_key_here}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-15000}
      AI_JOB_POLL_MS: ${AI_JOB_POLL_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCRAPER_CONCURRENCY: ${SCRAPER_CONCURRENCY:-2}
      SCRAPER_HEADLESS: ${SCRAPER_HEADLESS:-true}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-45000}
      SCRAPER_EXPAND_MAX_CLICKS: ${SCRAPER_EXPAND_MAX_CLICKS:-20}
      SCRAPER_EXPAND_WAIT_MS: ${SCRAPER_EXPAND_WAIT_MS:-1200}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bitalih-network

networks:
  bitalih-network:
    driver: bridge

volumes:
  mysql_data:
